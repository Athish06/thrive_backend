rules:
- id: fixora-wrapper-make-gemini-api-request
  pattern: "def _make_gemini_api_request(...):\n  ..."
  message: 'Vulnerable function ''_make_gemini_api_request()'' wraps httpx.AsyncClient.
    Vulnerability: Insecure API Request. User-controlled data is passed to the API
    request without proper validation or sanitization.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Insecure API Request
    confidence: MEDIUM
    wrapper_defined_in: ai_services.py
    wraps:
    - httpx.AsyncClient
    modules_used:
    - httpx
- id: fixora-wrapper-extract-text-with-ocr
