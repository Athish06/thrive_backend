- id: fixora-wrapper-create-supabase-client-instance
  pattern: "def _create_supabase_client_instance(...):\n  ..."
  message: 'Vulnerable function ''_create_supabase_client_instance()'' wraps create_client.
    Vulnerability: Insecure Database Connection. User-controlled data (SUPABASE_URL
    and SUPABASE_SERVICE_ROLE_KEY) is used to create a Supabase client instance without
    proper validation or sanitization.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Insecure Database Connection
    confidence: HIGH
    wrapper_defined_in: db.py
    wraps:
    - create_client
    modules_used:
    - supabase
- id: fixora-wrapper-create-tables-with-rls
  pattern: "def create_tables_with_rls(...):\n  ..."
  message: 'Vulnerable function ''create_tables_with_rls()'' wraps cur.execute. Vulnerability:
    SQL Injection. User-controlled data is passed to the cur.execute function without
    proper validation or sanitization, potentially leading to SQL injection attacks.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: supabase_setup.py
