rules:
- id: fixora-wrapper-validate-file-type
  patterns:
  - pattern-inside: "def validate_file_type(...):\n  ..."
  - pattern-either:
    - pattern: os.path.splitext(...)
    - pattern: $OBJ.splitext(...)
    - pattern: splitext(...)
  message: '### Path Traversal via `file_path`


    **Vulnerable Sink:** Passes untrusted data directly to `os.path.splitext`.


    **Live Exploit Vector:**

    ```python\n// Target Function: validate_file_type()\n// Parameter: file_path\n\n//
    Attacker executes:\nvalidate_file_type(file_path = ../etc/passwd)\n```


    **Outcome:**

    The attacker-controlled file_path can be manipulated to access sensitive files
    outside the intended directory.


    **Data at Risk (Impact):**

    Attackers can potentially read sensitive files on the system, leading to information
    disclosure.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: HIGH
    wrapper_defined_in: ai_services.py
    wraps:
    - os.path.splitext
    modules_used:
    - os
    vulnerable_parameter: file_path
    malicious_payload: ../etc/passwd
    exploit_explanation: The attacker-controlled file_path can be manipulated to access
      sensitive files outside the intended directory.
    exploit_injected_example: validate_file_type(file_path = ../etc/passwd)
    impact_summary: Attackers can potentially read sensitive files on the system,
      leading to information disclosure.
    cwe: &id001
    - CWE-22
    owasp: &id002
    - A01:2021
