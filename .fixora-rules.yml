- id: fixora-wrapper-upload-file-to-supabase
  patterns:
  - pattern-inside: "def upload_file_to_supabase(...):\n  ..."
  - pattern-either:
    - pattern: os.path.splitext(...)
    - pattern: $OBJ.splitext(...)
    - pattern: splitext(...)
    - pattern: supabase.storage.from_(...)
    - pattern: $OBJ.from_(...)
    - pattern: from_(...)
  message: '### Path Traversal via `file.filename`


    **Vulnerable Sink:** Passes untrusted data directly to `os.path.splitext, supabase.storage.from_`.


    **Live Exploit Vector:**

    ```python\n// Target Function: upload_file_to_supabase()\n// Parameter: file.filename\n\n//
    Attacker executes:\nupload_file_to_supabase(file.filename = ../../../etc/passwd)\n```


    **Outcome:**

    The attacker-controlled filename is used to construct the storage path, allowing
    for potential path traversal attacks.


    **Data at Risk (Impact):**

    Attackers can potentially read or overwrite sensitive files on the server.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: HIGH
    wrapper_defined_in: storage/supabase_storage.py
    wraps:
    - os.path.splitext
    - supabase.storage.from_
    modules_used:
    - tempfile
    - os
    - datetime
    - uuid
    - mimetypes
    - fastapi
    - ai_services
    - db
    vulnerable_parameter: file.filename
    malicious_payload: ../../../etc/passwd
    exploit_explanation: The attacker-controlled filename is used to construct the
      storage path, allowing for potential path traversal attacks.
    exploit_injected_example: upload_file_to_supabase(file.filename = ../../../etc/passwd)
    impact_summary: Attackers can potentially read or overwrite sensitive files on
      the server.
    cwe: *id001
    owasp: *id002
