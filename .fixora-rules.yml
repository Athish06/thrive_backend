- id: fixora-wrapper-upload-file-to-supabase
  pattern: "def upload_file_to_supabase(...):\n  ..."
  message: 'Vulnerable function ''upload_file_to_supabase()'' wraps os.path.splitext,
    mimetypes.guess_type, get_supabase_client, HTTPException, datetime.now, uuid4,
    supabase.storage.from_, tempfile.NamedTemporaryFile, temp_file.write, os.path.exists,
    extract_text_from_file, os.remove. Vulnerability: Arbitrary File Upload. User-controlled
    file upload without proper validation or sanitization'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Arbitrary File Upload
    confidence: HIGH
    wrapper_defined_in: storage/supabase_storage.py
    wraps:
    - os.path.splitext
    - mimetypes.guess_type
    - get_supabase_client
    - HTTPException
    - datetime.now
    - uuid4
    - supabase.storage.from_
    - tempfile.NamedTemporaryFile
    - temp_file.write
    - os.path.exists
    - extract_text_from_file
    - os.remove
    modules_used:
    - os
    - tempfile
    - fastapi
    - datetime
    - uuid
    - ai_services
    - db
    - mimetypes
